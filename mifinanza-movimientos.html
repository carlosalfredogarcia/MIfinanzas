<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card2: #21262d;
    --accent: #58a6ff;
    --danger: #f85149;
    --success: #3fb950;
    --text: #e6edf3;
    --subtext: #8b949e;
    --border: #21262d;
    --border2: #30363d;
  }
  html { visibility: hidden }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
  .phone { width: 390px; min-height: 100vh; background: var(--bg); }
  .header { padding: 52px 24px 16px; animation: fadeUp 0.4s ease both; }
  .header-title { font-family: 'DM Sans', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 13px; color: var(--subtext); margin-top: 2px; }
  .mes-selector { margin: 0 24px 16px; display: flex; align-items: center; justify-content: space-between; background: var(--card); border-radius: 16px; padding: 12px 16px; border: 1px solid var(--border); animation: fadeUp 0.4s 0.1s ease both; opacity: 0; }
  .mes-btn { background: none; border: none; color: var(--subtext); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background 0.2s, color 0.2s; }
  .mes-btn:hover { background: var(--card2); color: var(--text); }
  .mes-actual { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 0.02em; }
  .resumen-row { margin: 0 24px 16px; display: flex; gap: 10px; animation: fadeUp 0.4s 0.15s ease both; opacity: 0; }
  .res-item { flex: 1; background: var(--card); border-radius: 14px; padding: 12px 14px; border: 1px solid var(--border); }
  .res-label { font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--success); }
  .dot-red { background: var(--danger); }
  .res-value { font-family: 'Roboto', sans-serif; font-size: 18px; font-weight: 700; }
  .val-green { color: var(--success); }
  .val-red { color: var(--danger); }
  .lista-wrap { padding: 0 24px; animation: fadeUp 0.4s 0.25s ease both; opacity: 0; }
  .dia-grupo { margin-bottom: 20px; }
  .dia-label { font-size: 13px; font-weight: 400; color: #ffffff; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; padding-left: 2px; }
  .movimiento { background: var(--card); border-radius: 14px; padding: 13px 14px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; border: 1px solid var(--border); border-left-width: 3px; cursor: pointer; transition: opacity 0.15s; }
  .movimiento:active { opacity: 0.65; }
  .mov-bar-fijo    { border-left-color: var(--accent); }
  .mov-bar-ingreso { border-left-color: var(--success); }
  .mov-bar-gasto   { border-left-color: #30363d; }
  .mov-icon { width: 38px; height: 38px; border-radius: 12px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .mov-info { flex: 1; min-width: 0; }
  .mov-desc { font-size: 14px; color: #8b949e; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mov-cat  { font-size: 12px; color: var(--subtext); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mov-right { text-align: right; flex-shrink: 0; }
  .mov-amount { font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: 700; }
  .amount-gasto   { color: var(--danger); }
  .amount-ingreso { color: var(--success); }
  .loading { text-align: center; color: var(--subtext); font-size: 14px; padding: 40px 0; }

  .fab { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0d1117; width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(88,166,255,0.35); transition: transform 0.2s, box-shadow 0.2s; z-index: 100; }
  .fab:hover { transform: translateX(-50%) scale(1.08); box-shadow: 0 12px 40px rgba(88,166,255,0.5); }

  .navbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: rgba(13,17,23,0.97); backdrop-filter: blur(20px); border-top: 1px solid var(--border2); padding: 12px 0 24px; display: flex; justify-content: space-around; align-items: center; z-index: 99; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; opacity: 0.35; transition: opacity 0.2s; flex: 1; }
  .nav-item.active { opacity: 1; }
  .nav-icon { font-size: 22px; }
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }

  .mas-item { display: flex; align-items: center; gap: 14px; padding: 14px 2px; cursor: pointer; border-bottom: 1px solid var(--border); transition: opacity 0.15s; }
  .mas-item:last-of-type { border-bottom: none; margin-bottom: 16px; }
  .mas-item:active { opacity: 0.6; }
  .mas-icon { width: 42px; height: 42px; border-radius: 13px; background: rgba(88,166,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
  .mas-label { flex: 1; font-size: 15px; font-weight: 600; color: var(--text); }
  .mas-arrow { color: #58a6ff; font-size: 18px; }

  .spacer { height: 120px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  .inp { width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none; }
  .lbl { font-size:11px;color:var(--subtext);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px; }
  .fld { margin-bottom:12px; }
  .inp.inp-error { border-color: var(--danger); }
  .fld-error { display:none; font-size:11px; color:var(--danger); margin-top:6px; }
  .cat-lbl-row { display:flex; justify-content:space-between; align-items:center; }
  .cat-add-btn { color:#58a6ff; cursor:pointer; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; }
  .cat-nueva-panel { margin-top:8px; }
  .cat-nueva-row { display:flex; gap:8px; }
  .btn-cat-add { flex:1; background:#58a6ff; color:#0d1117; border:none; border-radius:10px; padding:10px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-cat-cancel { flex:1; background:none; border:1px solid var(--border2); border-radius:10px; padding:10px; color:var(--subtext); font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; }
  .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--card); border: 1px solid var(--border2); border-radius: 14px; padding: 12px 20px; font-size: 13px; color: var(--text); z-index: 300; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: rgba(88,166,255,0.4); color: #58a6ff; }
  .modal-base { position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;justify-content:center; }
  .modal-box { width:390px;background:var(--card);border-radius:28px 28px 0 0;padding:24px 24px 40px;border-top:1px solid var(--border); }
  .modal-handle { width:40px;height:4px;background:rgba(255,255,255,0.08);border-radius:100px;margin:0 auto 20px; }
  .modal-title { font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:18px; }
  .btn-ok { width:100%;border:none;border-radius:14px;padding:15px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px; }
  .btn-no { width:100%;background:none;border:none;color:var(--subtext);font-size:14px;cursor:pointer;padding:10px;font-family:'DM Sans',sans-serif; }
  .btn-del { width:100%;background:none;border:1px solid rgba(248,113,113,0.25);border-radius:14px;padding:13px;color:var(--danger);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:8px; }
</style>

<script>
  window.moneda = localStorage.getItem('moneda') || '$'
  const _color = localStorage.getItem('color'); if (_color) document.documentElement.style.setProperty('--accent', _color)

  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  let mesActual = new Date().getMonth();
  let anioActual = new Date().getFullYear();
  let categoriaActiva = 'todas';
  let todosMovimientos = [];
  let filtradosActuales = [];

  function actualizarMesLabel() {
    document.getElementById('mes-label').textContent = meses[mesActual] + ' ' + anioActual;
    document.getElementById('mes-subtitle').textContent = meses[mesActual] + ' ' + anioActual;
  }

  function cambiarMes(dir) {
    mesActual += dir;
    if (mesActual > 11) { mesActual = 0; anioActual++; }
    if (mesActual < 0)  { mesActual = 11; anioActual--; }
    actualizarMesLabel();
    cargarMovimientos();
  }

  async function cargarMovimientos() {
    document.getElementById('lista').innerHTML = '<div class="loading">Cargando...</div>';
    let uid = window.currentUserId;
    if (!uid) {
      uid = await new Promise(resolve => {
        const iv = setInterval(() => {
          if (window.currentUserId) { clearInterval(iv); resolve(window.currentUserId); }
        }, 50);
        setTimeout(() => { clearInterval(iv); resolve(null); }, 5000);
      });
    }
    if (!uid) return;
    const inicio = anioActual + '-' + String(mesActual + 1).padStart(2,'0') + '-01';
    const ultimoDia = new Date(anioActual, mesActual + 1, 0).getDate();
    const fin = anioActual + '-' + String(mesActual + 1).padStart(2,'0') + '-' + String(ultimoDia).padStart(2,'0');
    const [{ data: gastos }, { data: ingresos }, { data: fijos }] = await Promise.all([
      dbClient.from('gastos').select('*').eq('usuario_id', uid).gte('fecha', inicio).lte('fecha', fin).order('fecha', { ascending: false }),
      dbClient.from('ingresos').select('*').eq('usuario_id', uid).gte('fecha', inicio).lte('fecha', fin).order('fecha', { ascending: false }),
      dbClient.from('gastos_fijos').select('*').eq('usuario_id', uid).lte('fecha_inicio', fin).or(`fecha_fin.gte.${inicio},fecha_fin.is.null`)
    ]);
    const movGastos   = (gastos   || []).map(g => ({ ...g, tipo: 'gasto' }));
    const movIngresos = (ingresos || []).map(i => ({ ...i, tipo: 'ingreso', descripcion: i.concepto, categoria: i.tipo }));
    const movFijos    = (fijos    || []).map(f => {
      const dia    = f.dia_del_mes ? String(f.dia_del_mes).padStart(2, '0') : '01';
      const mesStr = String(mesActual + 1).padStart(2, '0');
      let fechaFijo = `${anioActual}-${mesStr}-${dia}`;
      if (fechaFijo < inicio) fechaFijo = inicio;
      if (fechaFijo > fin)    fechaFijo = fin;
      return { ...f, tipo: 'fijo', descripcion: f.nombre, fecha: fechaFijo };
    });
    todosMovimientos = [...movGastos, ...movIngresos, ...movFijos].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
    const totalIng = movIngresos.reduce((s, i) => s + parseFloat(i.monto), 0);
    const totalGas = [...movGastos, ...movFijos].reduce((s, g) => s + parseFloat(g.monto), 0);
    document.getElementById('total-ingresos').textContent = window.moneda + totalIng.toLocaleString();
    document.getElementById('total-gastos').textContent   = window.moneda + totalGas.toLocaleString();
    renderLista();
  }

  function filtrar(el, cat) {
    document.querySelectorAll('.filtro-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    categoriaActiva = cat;
    renderLista();
  }

  function getIcon(categoria) {
    if (!categoria) return '📦';
    const first = [...categoria.trim()][0];
    return first && first.codePointAt(0) > 127 ? first : '📦';
  }

  function renderLista() {
    const lista = document.getElementById('lista');
    lista.innerHTML = '';
    let filtrados = todosMovimientos;
    if (categoriaActiva === 'ingresos') {
      filtrados = todosMovimientos.filter(m => m.tipo === 'ingreso');
    } else if (categoriaActiva !== 'todas') {
      const catKey = categoriaActiva.replace(/[^\w\s]/g,'').trim();
      filtrados = todosMovimientos.filter(m => (m.tipo === 'gasto' || m.tipo === 'fijo') && m.categoria && m.categoria.includes(catKey));
    }
    if (filtrados.length === 0) {
      lista.innerHTML = '<div class="loading">Sin movimientos este mes</div>';
      return;
    }
    filtradosActuales = filtrados;
    const grupos = {};
    filtrados.forEach((m, idx) => {
      if (!grupos[m.fecha]) grupos[m.fecha] = [];
      grupos[m.fecha].push({ m, idx });
    });
    const hoy  = new Date().toISOString().split('T')[0];
    const ayer = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    Object.entries(grupos).forEach(([fecha, entries]) => {
      const grupo = document.createElement('div');
      grupo.className = 'dia-grupo';
      const label = document.createElement('div');
      label.className = 'dia-label';
      const fechaObj = new Date(fecha + 'T00:00:00');
      const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      const mesesAbr = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      label.textContent = fecha === hoy ? 'Hoy' : fecha === ayer ? 'Ayer' : dias[fechaObj.getDay()] + ', ' + fechaObj.getDate() + ' ' + mesesAbr[fechaObj.getMonth()];
      grupo.appendChild(label);
      entries.forEach(({ m, idx }) => {
        const div = document.createElement('div');
        const esFijo    = m.tipo === 'fijo';
        const esIngreso = m.tipo === 'ingreso';
        div.className = 'movimiento ' + (esFijo ? 'mov-bar-fijo' : esIngreso ? 'mov-bar-ingreso' : 'mov-bar-gasto');
        div.setAttribute('onclick', `abrirEditarIdx(${idx})`);
        div.dataset.idx = idx;
        const icon = esIngreso ? '💰' : esFijo ? '📌' : getIcon(m.categoria);
        div.innerHTML = `
          <div class="mov-icon">${icon}</div>
          <div class="mov-info">
            <div class="mov-desc">${m.descripcion || m.concepto}</div>
            ${esFijo && m.categoria ? `<div class="mov-cat">${m.categoria}</div>` : ''}
          </div>
          <div class="mov-right">
            <div class="mov-amount ${esIngreso ? 'amount-ingreso' : 'amount-gasto'}">
              ${esIngreso ? '+' : '-'}${window.moneda}${parseFloat(m.monto).toLocaleString()}
            </div>
          </div>
        `;
        grupo.appendChild(div);
      });
      lista.appendChild(grupo);
    });
  }

  const hoy = new Date().toISOString().split('T')[0];

  function abrirMenu()       { document.getElementById('menu-fab').style.display = 'flex'; }
  function cerrarMenu()      { document.getElementById('menu-fab').style.display = 'none'; }
  async function abrirGasto()     { cerrarMenu(); document.getElementById('g-fecha').value = hoy; await cargarCategoriasPerfil(); document.getElementById('modal-gasto').style.display = 'flex'; }
  function cerrarGasto()     { document.getElementById('modal-gasto').style.display = 'none'; }
  function abrirIngreso()    { cerrarMenu(); document.getElementById('i-fecha').value = hoy; document.getElementById('modal-ingreso').style.display = 'flex'; }
  function cerrarIngreso()   { document.getElementById('modal-ingreso').style.display = 'none'; }
  async function abrirGastoFijo() { cerrarMenu(); ocultarErrorFecha('f'); await cargarCategoriasPerfil(); document.getElementById('modal-fijo').style.display = 'flex'; }
  function cerrarGastoFijo() { document.getElementById('modal-fijo').style.display = 'none'; }

  async function guardarGasto() {
    const fecha       = document.getElementById('g-fecha').value;
    const descripcion = document.getElementById('g-descripcion').value.trim();
    const categoria   = document.getElementById('g-categoria').value;
    const monto       = parseFloat(document.getElementById('g-monto').value);
    if (!descripcion || isNaN(monto)) { alert('Completa descripción y monto'); return; }
    const { error } = await dbClient.from('gastos').insert([{ fecha, descripcion, categoria, monto, usuario_id: window.currentUserId }]);
    if (error) { alert('Error: ' + error.message); }
    else { alert('✅ Gasto guardado'); cerrarGasto(); cargarMovimientos(); }
  }

  async function guardarIngreso() {
    const fecha    = document.getElementById('i-fecha').value;
    const concepto = document.getElementById('i-concepto').value.trim();
    const tipo     = document.getElementById('i-tipo').value;
    const monto    = parseFloat(document.getElementById('i-monto').value);
    if (!concepto || isNaN(monto)) { alert('Completa concepto y monto'); return; }
    const { error } = await dbClient.from('ingresos').insert([{ fecha, concepto, tipo, monto, usuario_id: window.currentUserId }]);
    if (error) { alert('Error: ' + error.message); }
    else { alert('✅ Ingreso guardado'); cerrarIngreso(); cargarMovimientos(); }
  }

  function mostrarErrorFecha(prefix) {
    document.getElementById(prefix + '-fecha').classList.add('inp-error');
    document.getElementById(prefix + '-fecha-error').style.display = 'block';
  }

  function ocultarErrorFecha(prefix) {
    document.getElementById(prefix + '-fecha').classList.remove('inp-error');
    document.getElementById(prefix + '-fecha-error').style.display = 'none';
  }

  async function guardarFijo() {
    const fechaVal = document.getElementById('f-fecha').value.trim();
    if (!fechaVal) {
      document.getElementById('f-fecha-error').textContent = 'La fecha de inicio es obligatoria';
      document.getElementById('f-fecha-error').style.display = 'block';
      return;
    }
    ocultarErrorFecha('f');

    const nombre    = document.getElementById('f-nombre').value.trim();
    const categoria = document.getElementById('f-categoria').value;
    const monto     = parseFloat(document.getElementById('f-monto').value);
    const fecha     = fechaVal;
    const fechaFin  = document.getElementById('f-fecha-fin').value || null;
    if (!nombre || isNaN(monto)) { alert('Completa todos los campos'); return; }
    const dia = new Date(fecha).getDate();
    const { error } = await dbClient.from('gastos_fijos').insert([{ nombre, categoria, monto, dia_del_mes: dia, activo: true, fecha_inicio: fecha, fecha_fin: fechaFin, usuario_id: window.currentUserId }]);
    if (error) { alert('Error: ' + error.message); }
    else { alert('✅ Gasto fijo guardado'); cerrarGastoFijo(); cargarMovimientos(); }
  }

  let editando = null;

  async function abrirEditar(m) {
    editando = m;
    const esFijo    = m.tipo === 'fijo';
    const esIngreso = m.tipo === 'ingreso';
    await cargarCategoriasPerfil();
    document.getElementById('edit-title').textContent = esFijo ? 'Editar gasto fijo' : esIngreso ? 'Editar ingreso' : 'Editar gasto';
    document.getElementById('edit-btn-ok').style.background = esFijo ? '#58a6ff' : esIngreso ? '#3fb950' : '#f85149';
    document.getElementById('edit-btn-ok').style.color = '#0d1117';
    document.getElementById('lbl-e-fecha').textContent = esFijo ? 'Fecha de inicio' : 'Fecha';
    document.getElementById('e-fecha-error').textContent = esFijo ? 'La fecha de inicio es obligatoria' : 'La fecha es obligatoria';
    ocultarErrorFecha('e');
    document.getElementById('e-fecha').value = esFijo ? (m.fecha_inicio || m.fecha || '').slice(0, 10) : (m.fecha || '').slice(0, 10);
    document.getElementById('e-monto').value = m.monto;
    document.getElementById('fld-descripcion').style.display = (!esFijo && !esIngreso) ? '' : 'none';
    document.getElementById('fld-concepto').style.display    = esIngreso ? '' : 'none';
    document.getElementById('fld-categoria').style.display   = (!esFijo && !esIngreso) ? '' : 'none';
    document.getElementById('fld-tipo').style.display        = esIngreso ? '' : 'none';
    document.getElementById('fld-nombre').style.display      = esFijo ? '' : 'none';
    document.getElementById('fld-cat-fijo').style.display    = esFijo ? '' : 'none';
    document.getElementById('fld-fecha-fin').style.display   = esFijo ? '' : 'none';
    if (esFijo) {
      document.getElementById('e-nombre').value    = m.nombre || '';
      document.getElementById('e-cat-fijo').value  = m.categoria;
      document.getElementById('e-fecha-fin').value = (m.fecha_fin || '').slice(0, 10);
    } else if (esIngreso) {
      document.getElementById('e-concepto').value = m.concepto || m.descripcion || '';
      const tipoSel = document.getElementById('e-tipo');
      [...tipoSel.options].forEach(o => { if (o.value === m.categoria) tipoSel.value = m.categoria; });
    } else {
      document.getElementById('e-descripcion').value = m.descripcion || '';
      const catSel = document.getElementById('e-categoria');
      [...catSel.options].forEach(o => { if (o.value === m.categoria) catSel.value = m.categoria; });
    }
    document.getElementById('modal-editar').style.display = 'flex';
  }

  function cerrarEditar() {
    document.getElementById('modal-editar').style.display = 'none';
    editando = null;
  }

  async function guardarEdicion() {
    if (!editando) return;
    const fechaVal = document.getElementById('e-fecha').value.trim();
    if (!fechaVal) { mostrarErrorFecha('e'); return; }
    ocultarErrorFecha('e');

    const fecha = fechaVal;
    const monto = parseFloat(document.getElementById('e-monto').value);
    if (isNaN(monto)) { alert('Completa todos los campos'); return; }
    let error;
    if (editando.tipo === 'fijo') {
      const nombre    = document.getElementById('e-nombre').value.trim();
      const categoria = document.getElementById('e-cat-fijo').value;
      if (!nombre) { alert('Completa el nombre'); return; }
      const fechaFin  = document.getElementById('e-fecha-fin').value || null;
      const dia = new Date(fecha + 'T00:00:00').getDate();
      ({ error } = await dbClient.from('gastos_fijos').update({ nombre, categoria, monto, fecha_inicio: fecha, fecha_fin: fechaFin, dia_del_mes: dia }).eq('id', editando.id).eq('usuario_id', window.currentUserId));
    } else if (editando.tipo === 'ingreso') {
      const concepto = document.getElementById('e-concepto').value.trim();
      const tipo     = document.getElementById('e-tipo').value;
      if (!concepto) { alert('Completa el concepto'); return; }
      ({ error } = await dbClient.from('ingresos').update({ fecha, concepto, tipo, monto }).eq('id', editando.id).eq('usuario_id', window.currentUserId));
    } else {
      const descripcion = document.getElementById('e-descripcion').value.trim();
      const categoria   = document.getElementById('e-categoria').value;
      if (!descripcion) { alert('Completa la descripción'); return; }
      ({ error } = await dbClient.from('gastos').update({ fecha, descripcion, categoria, monto }).eq('id', editando.id).eq('usuario_id', window.currentUserId));
    }
    if (error) { alert('Error: ' + error.message); return; }
    cerrarEditar();
    cargarMovimientos();
  }

  async function eliminarMovimiento() {
    if (!editando) return;
    const msg = editando.tipo === 'fijo' ? '¿Eliminar este gasto fijo? El historial quedará guardado.' : '¿Eliminar este movimiento?';
    if (!confirm(msg)) return;
    const tabla = editando.tipo === 'ingreso' ? 'ingresos' : editando.tipo === 'fijo' ? 'gastos_fijos' : 'gastos';
    const { error } = await dbClient.from(tabla).delete().eq('id', editando.id).eq('usuario_id', window.currentUserId);
    if (error) { alert('Error: ' + error.message); return; }
    cerrarEditar();
    cargarMovimientos();
  }

  function abrirEditarIdx(idx) {
    const m = filtradosActuales[idx];
    if (m) abrirEditar(m);
  }

  actualizarMesLabel();

  document.getElementById('f-fecha').addEventListener('input', () => ocultarErrorFecha('f'));
  document.getElementById('e-fecha').addEventListener('input', () => ocultarErrorFecha('e'));

  function abrirPanelMas() { document.getElementById('panel-mas').style.display = 'flex'; }
  function cerrarPanelMas() { document.getElementById('panel-mas').style.display = 'none'; }
  document.getElementById('panel-mas').addEventListener('click', function(e) { if (e.target === this) cerrarPanelMas(); });

  const CATS_DEFAULT = '🍔 Comida,🏠 Alquiler,💳 Crédito,📱 Línea,🏋️ Gym,⛽ Gasolina,💻 Tecnología,❤️ Salud,👕 Ropa,🎉 Salidas,🌍 Remesas,⚠️ Gastos Imprevistos,📋 Trámite,🚗 Vehículo,📦 Otros'

  async function cargarCategoriasPerfil() {
    const { data: { session } } = await dbClient.auth.getSession();
    const uid = session?.user?.id;
    if (!uid) return;
    const { data: perfil } = await dbClient.from('perfil').select('categorias').eq('usuario_id', uid).maybeSingle();
    const catsStr = perfil?.categorias || CATS_DEFAULT;
    const cats = catsStr.split(',').map(c => c.trim()).filter(Boolean);
    ['g-categoria', 'f-categoria', 'e-categoria', 'e-cat-fijo'].forEach(id => {
      const sel = document.getElementById(id);
      if (sel) sel.innerHTML = cats.map(c => `<option>${c}</option>`).join('');
    });
  }

  function toast(msg, tipo = 'ok') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${tipo} show`;
    setTimeout(() => { t.className = 'toast'; }, 2500);
  }

  let nuevaCatTarget = null;

  function toggleNuevaCat(targetId) {
    nuevaCatTarget = targetId;
    const panel = document.getElementById('panel-nueva-cat');
    panel.style.display = 'block';
    document.getElementById('nueva-cat-input').value = '';
    document.getElementById('nueva-cat-input').focus();
  }

  function cerrarNuevaCat() {
    document.getElementById('panel-nueva-cat').style.display = 'none';
    document.getElementById('nueva-cat-input').value = '';
  }

  async function guardarNuevaCategoria() {
    const nueva = document.getElementById('nueva-cat-input').value.trim();
    if (!nueva) { alert('Escribe una categoría'); return; }
    const uid = window.currentUserId;
    if (!uid) return;

    const { data: perfil } = await dbClient.from('perfil').select('categorias').eq('usuario_id', uid).maybeSingle();
    const catsStr = perfil?.categorias || CATS_DEFAULT;
    const cats = catsStr.split(',').map(c => c.trim()).filter(Boolean);
    if (cats.includes(nueva)) { alert('Esa categoría ya existe'); return; }
    cats.push(nueva);
    const nuevaLista = cats.join(',');

    const { data: actualizados, error: errUpdate } = await dbClient.from('perfil')
      .update({ categorias: nuevaLista }).eq('usuario_id', uid).select('id');
    let error = errUpdate;
    if (!errUpdate && (!actualizados || actualizados.length === 0)) {
      ({ error } = await dbClient.from('perfil').insert({ usuario_id: uid, categorias: nuevaLista }));
    }
    if (error) { alert('Error: ' + error.message); return; }

    ['g-categoria', 'f-categoria', 'e-categoria', 'e-cat-fijo'].forEach(id => {
      const sel = document.getElementById(id);
      if (sel) sel.innerHTML += `<option>${nueva}</option>`;
    });
    if (nuevaCatTarget) document.getElementById(nuevaCatTarget).value = nueva;

    cerrarNuevaCat();
    toast('✅ Categoría añadida');
  }

  cargarMovimientos();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
