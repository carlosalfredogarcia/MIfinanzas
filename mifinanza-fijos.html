<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiFinanza – Gastos Fijos</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card2: #21262d;
    --accent: #58a6ff;
    --danger: #f85149;
    --success: #3fb950;
    --text: #e6edf3;
    --subtext: #8b949e;
    --border: #21262d;
    --border2: #30363d;
  }
  html { visibility: hidden }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
  .phone { width: 390px; min-height: 100vh; background: var(--bg); }

  .header { padding: 52px 24px 16px; animation: fadeUp 0.4s ease both; }
  .header-title { font-family: 'DM Sans', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 13px; color: var(--subtext); margin-top: 2px; }

  .resumen-row { margin: 0 24px 16px; display: flex; gap: 10px; animation: fadeUp 0.4s 0.1s ease both; opacity: 0; }
  .res-item { flex: 1; background: var(--card); border-radius: 14px; padding: 12px 14px; border: 1px solid var(--border); }
  .res-label { font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-red  { background: var(--danger); }
  .dot-blue { background: var(--accent); }
  .res-value { font-family: 'Roboto', sans-serif; font-size: 18px; font-weight: 700; }
  .val-red  { color: var(--danger); }
  .val-blue { color: var(--accent); }

  .lista-wrap { padding: 0 24px; animation: fadeUp 0.4s 0.2s ease both; opacity: 0; }
  .seccion-label { font-size: 11px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; padding-left: 2px; }

  .fijo-card { background: var(--card); border-radius: 14px; padding: 13px 14px; margin-bottom: 8px; border: 1px solid var(--border); border-left: 3px solid var(--danger); transition: opacity 0.2s; }
  .fijo-card.inactivo { opacity: 0.4; border-left-color: var(--border2); }
  .fijo-top { display: flex; align-items: center; gap: 12px; }
  .fijo-icon { width: 38px; height: 38px; border-radius: 12px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .fijo-info { flex: 1; min-width: 0; }
  .fijo-nombre { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fijo-fecha  { font-size: 12px; color: var(--subtext); margin-top: 2px; }
  .fijo-right  { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .fijo-monto  { font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: 700; color: var(--danger); }

  .switch { width: 40px; height: 22px; background: var(--card2); border-radius: 100px; border: 1px solid var(--border2); position: relative; cursor: pointer; transition: background 0.3s, border-color 0.3s; flex-shrink: 0; }
  .switch.on { background: rgba(88,166,255,0.2); border-color: rgba(88,166,255,0.4); }
  .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--subtext); transition: transform 0.3s, background 0.3s; }
  .switch.on::after { transform: translateX(18px); background: var(--accent); }

  .fijo-acciones { display: flex; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2); }
  .btn-accion { flex: 1; background: none; border: none; padding: 6px 0; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: color 0.15s; text-align: center; }
  .btn-editar  { color: var(--accent); }
  .btn-editar:hover  { color: #79baff; }
  .btn-eliminar { color: var(--danger); }
  .btn-eliminar:hover { color: #ff7a77; }
  .sep-v { width: 1px; height: 18px; background: var(--border2); }

  .loading { text-align: center; color: var(--subtext); font-size: 14px; padding: 40px 0; }

  .fab { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0d1117; width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(88,166,255,0.35); transition: transform 0.2s, box-shadow 0.2s; z-index: 100; }
  .fab:hover { transform: translateX(-50%) scale(1.08); box-shadow: 0 12px 40px rgba(88,166,255,0.5); }

  .navbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: rgba(13,17,23,0.97); backdrop-filter: blur(20px); border-top: 1px solid var(--border2); padding: 12px 0 24px; display: flex; justify-content: space-around; align-items: center; z-index: 99; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; opacity: 0.35; transition: opacity 0.2s; flex: 1; }
  .nav-item.active { opacity: 1; }
  .nav-icon { font-size: 22px; }
  .nav-dot  { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal { width: 390px; background: var(--card); border-radius: 28px 28px 0 0; padding: 24px 24px 40px; border-top: 1px solid var(--border2); }
  .modal-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 100px; margin: 0 auto 20px; }
  .modal-title  { font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 18px; }
  .modal-sub    { font-size: 13px; color: var(--subtext); margin-bottom: 14px; line-height: 1.5; }
  .inp { width:100%; background:#0d1117; border:1px solid var(--border2); border-radius:12px; padding:12px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; transition: border-color 0.15s; }
  .inp:focus { border-color: var(--accent); }
  .lbl { font-size:11px; color:var(--subtext); text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:6px; }
  .fld { margin-bottom:12px; }
  .btn-ok { width:100%; border:none; border-radius:14px; padding:15px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; cursor:pointer; margin-bottom:8px; transition:opacity 0.2s; }
  .btn-ok:hover { opacity: 0.9; }
  .btn-no { width:100%; background:none; border:none; color:var(--subtext); font-size:14px; cursor:pointer; padding:10px; font-family:'DM Sans',sans-serif; }

  .spacer { height: 120px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
</style>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MiFinanza">
<meta name="theme-color" content="#58a6ff">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
</head>
<body>
<div class="phone">

  <div class="header">
    <div class="header-title">Gastos Fijos</div>
    <div class="header-sub">Lo que sale cada mes automáticamente</div>
  </div>

  <div class="resumen-row">
    <div class="res-item">
      <div class="res-label"><span class="dot dot-red"></span>Total mensual</div>
      <div class="res-value val-red" id="total-mensual">$0</div>
    </div>
    <div class="res-item">
      <div class="res-label"><span class="dot dot-blue"></span>Activos</div>
      <div class="res-value val-blue" id="total-activos">0</div>
    </div>
  </div>

  <div class="lista-wrap">
    <div class="seccion-label">Este mes</div>
    <div id="lista-fijos"><div class="loading">Cargando...</div></div>
  </div>

  <div class="spacer"></div>
</div>

<button class="fab" onclick="abrirModal()">+</button>

<nav class="navbar">
  <div class="nav-item" onclick="location.href='inicio.html'">
    <span class="nav-icon">🏠</span>
  </div>
  <div class="nav-item active" onclick="location.href='mifinanza-movimientos.html'">
    <span class="nav-icon">📋</span>
    <div class="nav-dot"></div>
  </div>
  <div class="nav-item" onclick="location.href='mifinanza-estadisticas-v2.html'">
    <span class="nav-icon">📊</span>
  </div>
  <div class="nav-item" onclick="location.href='mifinanza-perfil.html'">
    <span class="nav-icon">👤</span>
  </div>
</nav>

<!-- Modal nuevo gasto fijo -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo gasto fijo</div>
    <div class="fld"><label class="lbl">Nombre</label><input type="text" id="f-nombre" class="inp" placeholder="Ej: Netflix, Alquiler..."></div>
    <div class="fld"><label class="lbl">Categoría</label>
      <select id="f-categoria" class="inp">
        <option>🍔 Comida</option><option>🏠 Alquiler</option><option>💳 Crédito</option><option>📱 Línea</option><option>🏋️ Gym</option><option>⛽ Gasolina</option><option>💻 Tecnología</option><option>❤️ Salud</option><option>👕 Ropa</option><option>🎉 Salidas</option><option>🌍 Remesas</option><option>⚠️ Gastos Imprevistos</option><option>📋 Trámite</option><option>🚗 Vehículo</option><option>📦 Otros</option>
      </select>
    </div>
    <div class="fld"><label class="lbl">Monto</label><input type="number" id="f-monto" class="inp" placeholder="$0.00"></div>
    <div class="fld"><label class="lbl">Fecha de inicio</label><input type="date" id="f-fecha" class="inp"></div>
    <div class="fld" style="margin-bottom:18px"><label class="lbl">Fecha fin (opcional)</label><input type="date" id="fijo-fecha-fin" class="inp"></div>
    <button class="btn-ok" style="background:var(--accent);color:#0d1117" onclick="guardarFijo()">Guardar gasto fijo</button>
    <button class="btn-no" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<!-- Modal desactivar gasto fijo -->
<div class="modal-overlay" id="modal-desactivar">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">¿Desactivar gasto fijo?</div>
    <p class="modal-sub">Vas a desactivar <strong id="nombre-fijo-confirm" style="color:var(--text)"></strong>. El historial anterior quedará guardado.</p>
    <div class="fld" style="margin-bottom:18px">
      <label class="lbl">¿Hasta qué fecha estuvo activo?</label>
      <input type="date" id="fecha-fin-input" class="inp">
    </div>
    <button class="btn-ok" style="background:var(--accent);color:#0d1117" onclick="confirmarDesactivar()">Confirmar</button>
    <button class="btn-no" onclick="cancelarDesactivar()">Cancelar</button>
  </div>
</div>

<!-- Modal editar gasto fijo -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Editar gasto fijo</div>
    <div class="fld"><label class="lbl">Nombre</label><input type="text" id="e-nombre" class="inp"></div>
    <div class="fld"><label class="lbl">Categoría</label>
      <select id="e-categoria" class="inp">
        <option>🍔 Comida</option><option>🏠 Alquiler</option><option>💳 Crédito</option><option>📱 Línea</option><option>🏋️ Gym</option><option>⛽ Gasolina</option><option>💻 Tecnología</option><option>❤️ Salud</option><option>👕 Ropa</option><option>🎉 Salidas</option><option>🌍 Remesas</option><option>⚠️ Gastos Imprevistos</option><option>📋 Trámite</option><option>🚗 Vehículo</option><option>📦 Otros</option>
      </select>
    </div>
    <div class="fld"><label class="lbl">Monto</label><input type="number" id="e-monto" class="inp"></div>
    <div class="fld" style="margin-bottom:18px"><label class="lbl">Fecha de inicio</label><input type="date" id="e-fecha" class="inp"></div>
    <button class="btn-ok" style="background:var(--accent);color:#0d1117" onclick="guardarEdicion()">Guardar cambios</button>
    <button class="btn-no" onclick="cerrarEditar()">Cancelar</button>
  </div>
</div>

<script>
  window.moneda = localStorage.getItem('moneda') || '$'
  const _color = localStorage.getItem('color'); if (_color) document.documentElement.style.setProperty('--accent', _color)
  let fijos = [];

  async function cargarFijos() {
    if (!window.currentUserId) {
      await new Promise(resolve => {
        const iv = setInterval(() => {
          if (window.currentUserId) { clearInterval(iv); resolve() }
        }, 50)
        setTimeout(() => { clearInterval(iv); resolve() }, 5000)
      })
    }
    if (!window.currentUserId) return
    const { data, error } = await dbClient.from('gastos_fijos').select('*').eq('usuario_id', window.currentUserId).order('created_at');
    if (error) { console.error(error); return; }
    fijos = data;
    renderFijos();
  }

  function renderFijos() {
    const lista = document.getElementById('lista-fijos');
    lista.innerHTML = '';

    const ordenados = [...fijos].sort((a, b) => b.activo - a.activo);

    if (ordenados.length === 0) {
      lista.innerHTML = '<div class="loading">No hay gastos fijos aún</div>';
    }

    ordenados.forEach(f => {
      const iconos = { 'Alquiler':'🏠','Línea':'📱','Remesas':'🌍','Tecnología':'💻','Gym':'🏋️','Salud':'❤️','Crédito':'💳','Otros':'📦' };
      const catNombre = f.categoria ? f.categoria.replace(/[^\w\s]/g, '').trim() : 'Otros';
      const icon = iconos[catNombre] || '📦';

      const div = document.createElement('div');
      div.className = 'fijo-card' + (f.activo ? '' : ' inactivo');
      div.innerHTML = `
        <div class="fijo-top">
          <div class="fijo-icon">${icon}</div>
          <div class="fijo-info">
            <div class="fijo-nombre">${f.nombre}</div>
            <div class="fijo-fecha">Desde ${f.fecha_inicio || '—'}</div>
          </div>
          <div class="fijo-right">
            <div class="fijo-monto">${window.moneda}${f.monto}</div>
            <div class="switch ${f.activo ? 'on' : ''}" onclick="toggleActivo('${f.id}')"></div>
          </div>
        </div>
        <div class="fijo-acciones">
          <button class="btn-accion btn-editar"   onclick="editarFijo('${f.id}')">Editar</button>
          <div class="sep-v"></div>
          <button class="btn-accion btn-eliminar" onclick="eliminarFijo('${f.id}')">Eliminar</button>
        </div>
      `;
      lista.appendChild(div);
    });

    const activos = fijos.filter(f => f.activo);
    const total = activos.reduce((s, f) => s + parseFloat(f.monto), 0);
    document.getElementById('total-mensual').textContent = window.moneda + total.toLocaleString();
    document.getElementById('total-activos').textContent = activos.length;
  }

  async function toggleActivo(id) {
    const f = fijos.find(f => f.id === id);
    if (!f) return;

    if (f.activo) {
      const hoy = new Date().toISOString().split('T')[0];
      document.getElementById('fecha-fin-input').value = hoy;
      document.getElementById('nombre-fijo-confirm').textContent = f.nombre;
      idFijoDesactivar = id;
      document.getElementById('modal-desactivar').style.display = 'flex';
    } else {
      const { error } = await dbClient.from('gastos_fijos')
        .update({ activo: true, fecha_fin: null })
        .eq('id', id).eq('usuario_id', window.currentUserId);
      if (error) { alert('Error: ' + error.message); return; }
      f.activo = true;
      f.fecha_fin = null;
      renderFijos();
    }
  }

  let idFijoDesactivar = null;

  async function confirmarDesactivar() {
    const fecha = document.getElementById('fecha-fin-input').value;
    if (!fecha) { alert('Selecciona una fecha'); return; }
    const { error } = await dbClient.from('gastos_fijos')
      .update({ activo: false, fecha_fin: fecha })
      .eq('id', idFijoDesactivar).eq('usuario_id', window.currentUserId);
    if (error) { alert('Error: ' + error.message); return; }
    const f = fijos.find(f => f.id === idFijoDesactivar);
    if (f) { f.activo = false; f.fecha_fin = fecha; }
    document.getElementById('modal-desactivar').style.display = 'none';
    renderFijos();
  }

  function cancelarDesactivar() {
    document.getElementById('modal-desactivar').style.display = 'none';
  }

  let idFijoEditar = null;

  function editarFijo(id) {
    const f = fijos.find(f => f.id === id);
    if (!f) return;
    idFijoEditar = id;
    cargarCategoriasPerfil();
    document.getElementById('e-nombre').value    = f.nombre;
    document.getElementById('e-categoria').value = f.categoria;
    document.getElementById('e-monto').value     = f.monto;
    document.getElementById('e-fecha').value     = f.fecha_inicio || '';
    document.getElementById('modal-editar').style.display = 'flex';
  }

  function cerrarEditar() {
    document.getElementById('modal-editar').style.display = 'none';
  }

  async function guardarEdicion() {
    const nombre    = document.getElementById('e-nombre').value.trim();
    const categoria = document.getElementById('e-categoria').value;
    const monto     = parseFloat(document.getElementById('e-monto').value);
    const fecha     = document.getElementById('e-fecha').value;
    if (!nombre || isNaN(monto) || !fecha) { alert('Completa todos los campos'); return; }
    const dia = new Date(fecha).getDate();
    const { error } = await dbClient.from('gastos_fijos')
      .update({ nombre, categoria, monto, fecha_inicio: fecha, dia_del_mes: dia })
      .eq('id', idFijoEditar).eq('usuario_id', window.currentUserId);
    if (error) { alert('Error: ' + error.message); return; }
    const f = fijos.find(f => f.id === idFijoEditar);
    if (f) { f.nombre = nombre; f.categoria = categoria; f.monto = monto; f.fecha_inicio = fecha; f.dia_del_mes = dia; }
    cerrarEditar();
    renderFijos();
  }

  async function eliminarFijo(id) {
    if (!confirm('¿Eliminar este gasto fijo? El historial quedará guardado.')) return;
    const { error } = await dbClient.from('gastos_fijos').delete().eq('id', id).eq('usuario_id', window.currentUserId);
    if (error) { alert('Error: ' + error.message); return; }
    fijos = fijos.filter(f => f.id !== id);
    renderFijos();
  }

  function abrirModal() {
    document.getElementById('f-nombre').value = '';
    document.getElementById('f-monto').value = '';
    document.getElementById('f-fecha').value = '';
    document.getElementById('fijo-fecha-fin').value = '';
    cargarCategoriasPerfil();
    document.getElementById('modal').style.display = 'flex';
  }
  function cerrarModal() { document.getElementById('modal').style.display = 'none'; }

  async function guardarFijo() {
    const nombre    = document.getElementById('f-nombre').value.trim();
    const categoria = document.getElementById('f-categoria').value;
    const monto     = parseFloat(document.getElementById('f-monto').value);
    const fecha     = document.getElementById('f-fecha').value;
    const fechaFin  = document.getElementById('fijo-fecha-fin').value || null;
    if (!nombre || isNaN(monto) || !fecha) { alert('Completa todos los campos'); return; }
    const dia = new Date(fecha).getDate();
    const { data, error } = await dbClient.from('gastos_fijos').insert([{ nombre, categoria, monto, dia_del_mes: dia, activo: true, fecha_inicio: fecha, fecha_fin: fechaFin, usuario_id: window.currentUserId }]).select();
    if (error) { alert('Error: ' + error.message); return; }
    fijos.push(data[0]);
    cerrarModal();
    renderFijos();
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });
  document.getElementById('modal-desactivar').addEventListener('click', function(e) {
    if (e.target === this) cancelarDesactivar();
  });
  document.getElementById('modal-editar').addEventListener('click', function(e) {
    if (e.target === this) cerrarEditar();
  });

  const CATS_DEFAULT = '🍔 Comida,🏠 Alquiler,💳 Crédito,📱 Línea,🏋️ Gym,⛽ Gasolina,💻 Tecnología,❤️ Salud,👕 Ropa,🎉 Salidas,🌍 Remesas,⚠️ Gastos Imprevistos,📋 Trámite,🚗 Vehículo,📦 Otros'

  async function cargarCategoriasPerfil() {
    const { data: { session } } = await dbClient.auth.getSession();
    const uid = session?.user?.id;
    if (!uid) return;
    const { data: perfil } = await dbClient.from('perfil').select('categorias').eq('usuario_id', uid).maybeSingle();
    const catsStr = perfil?.categorias || CATS_DEFAULT;
    const cats = catsStr.split(',').map(c => c.trim()).filter(Boolean);
    ['f-categoria', 'e-categoria'].forEach(id => {
      const sel = document.getElementById(id);
      if (sel) sel.innerHTML = cats.map(c => `<option>${c}</option>`).join('');
    });
  }

  cargarFijos();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
