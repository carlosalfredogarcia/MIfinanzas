<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>MiFinanza – Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --card2: #21262d;
    --accent: #58a6ff;
    --danger: #f85149;
    --success: #3fb950;
    --text: #e6edf3;
    --subtext: #8b949e;
    --border: #21262d;
    --border2: #30363d;
  }
  html { visibility: hidden }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
  .phone { width: 390px; min-height: 100vh; background: var(--bg); }
  .header { padding: 52px 24px 18px; display: flex; justify-content: space-between; align-items: flex-start; animation: fadeUp 0.4s ease both; }
  .mes-nav-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .mes-center { flex: 1; text-align: center; }
  .mes-label-small { font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 3px; }
  .mes-arrow { background: none; border: none; color: var(--subtext); font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background 0.2s, color 0.2s; }
  .mes-arrow:hover { background: var(--card2); color: var(--text); }
  #mes-badge { font-family: 'Roboto', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 0.04em; }
  .greeting .nombre { font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); }
  .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 16px; color: #0d1117; flex-shrink: 0; }
  .balance-card { margin: 0 24px 14px; background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid var(--border); animation: fadeUp 0.4s 0.1s ease both; opacity: 0; }
  .balance-label { font-size: 11px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .month-badge { background: rgba(88,166,255,0.1); color: var(--accent); font-size: 10px; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.06em; }
  .balance-row { display: flex; gap: 10px; }
  .balance-item { flex: 1; background: var(--card2); border-radius: 14px; padding: 14px 12px; }
  .balance-item-label { font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--success); } .dot-red { background: var(--danger); }
  .balance-item-value { font-family: 'Roboto', sans-serif; font-size: 22px; font-weight: 700; }
  .val-green { color: var(--success); } .val-red { color: var(--danger); }
  .saldo-stripe { background: var(--card2); border: 1px solid var(--border2); border-radius: 14px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .saldo-stripe-label { font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 3px; font-weight: 600; }
  .saldo-stripe.negativo .saldo-stripe-label { color: var(--danger); }
  .saldo-stripe-amount { font-family: 'Roboto', sans-serif; font-size: 30px; font-weight: 700; color: var(--success); }
  .saldo-stripe.negativo .saldo-stripe-amount { color: #e3b341; }
  .saldo-stripe-icon { font-size: 24px; color: var(--success); opacity: 0.85; }
  .saldo-stripe.negativo .saldo-stripe-icon { color: #e3b341; }
  .fijos-card { margin: 0 24px 14px; background: var(--card); border-radius: 20px; padding: 18px 20px; border: 1px solid var(--border); animation: fadeUp 0.4s 0.35s ease both; opacity: 0; cursor: pointer; }
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .section-title { font-size: 11px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.1em; }
  .section-total { font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 700; color: var(--subtext); }
  .fijo-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .fijo-item:last-child { border-bottom: none; }
  .fijo-left { display: flex; align-items: center; gap: 10px; }
  .fijo-icon { width: 34px; height: 34px; border-radius: 10px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .fijo-name { font-size: 14px; color: var(--text); font-weight: 500; }
  .fijo-date { font-size: 11px; color: var(--subtext); }
  .fijo-amount { font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 700; color: var(--danger); }
  .ultimo-card { margin: 0 24px 14px; background: var(--card); border-radius: 20px; padding: 14px 18px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; animation: fadeUp 0.4s 0.45s ease both; opacity: 0; }
  .ultimo-icon { width: 38px; height: 38px; border-radius: 12px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .ultimo-info { flex: 1; }
  .ultimo-label { font-size: 10px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; }
  .ultimo-desc { font-size: 14px; color: var(--text); font-weight: 500; }
  .ultimo-date { font-size: 11px; color: var(--subtext); margin-top: 1px; }
  .ultimo-amount { font-family: 'Roboto', sans-serif; font-size: 16px; font-weight: 700; color: var(--danger); }
  .fab { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--success); color: #0d1117; width: 56px; height: 56px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(63,185,80,0.4); transition: transform 0.2s, box-shadow 0.2s; z-index: 100; }
  .fab:hover { transform: translateX(-50%) scale(1.08); box-shadow: 0 12px 40px rgba(63,185,80,0.55); }
  .navbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 390px; background: rgba(13,17,23,0.97); backdrop-filter: blur(20px); border-top: 1px solid var(--border2); padding: 12px 0 24px; display: flex; justify-content: space-around; align-items: center; z-index: 99; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; opacity: 0.35; transition: opacity 0.2s; flex: 1; }
  .nav-item.active { opacity: 1; }
  .nav-icon { font-size: 22px; }
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
  .mas-item { display: flex; align-items: center; gap: 14px; padding: 14px 2px; cursor: pointer; border-bottom: 1px solid var(--border); transition: opacity 0.15s; }
  .mas-item:last-of-type { border-bottom: none; margin-bottom: 16px; }
  .mas-item:active { opacity: 0.6; }
  .mas-icon { width: 42px; height: 42px; border-radius: 13px; background: rgba(88,166,255,0.12); display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }
  .mas-label { flex: 1; font-size: 15px; font-weight: 600; color: var(--text); }
  .mas-arrow { color: #58a6ff; font-size: 18px; }
  .spacer { height: 120px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .inp { width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none; }
  .lbl { font-size:11px;color:var(--subtext);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px; }
  .fld { margin-bottom:12px; }
  .cat-lbl-row { display:flex; justify-content:space-between; align-items:center; }
  .cat-add-btn { color:#58a6ff; cursor:pointer; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.08em; }
  .cat-nueva-panel { margin-top:8px; }
  .cat-nueva-row { display:flex; gap:8px; }
  .btn-cat-add { flex:1; background:#58a6ff; color:#0d1117; border:none; border-radius:10px; padding:10px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }
  .btn-cat-cancel { flex:1; background:none; border:1px solid var(--border2); border-radius:10px; padding:10px; color:var(--subtext); font-family:'DM Sans',sans-serif; font-size:13px; cursor:pointer; }
  .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--card); border: 1px solid var(--border2); border-radius: 14px; padding: 12px 20px; font-size: 13px; color: var(--text); z-index: 300; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: rgba(88,166,255,0.4); color: #58a6ff; }
  .modal-base { position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;justify-content:center; }
  .modal-box { width:390px;background:var(--card);border-radius:28px 28px 0 0;padding:24px 24px 40px;border-top:1px solid var(--border); }
  .modal-handle { width:40px;height:4px;background:rgba(255,255,255,0.08);border-radius:100px;margin:0 auto 20px; }
  .modal-title { font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:18px; }
  .btn-ok { width:100%;border:none;border-radius:14px;padding:15px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:8px; }
  .btn-no { width:100%;background:none;border:none;color:var(--subtext);font-size:14px;cursor:pointer;padding:10px;font-family:'DM Sans',sans-serif; }
</style>

<script>
  window.moneda = localStorage.getItem('moneda') || '$'
  const _color = localStorage.getItem('color'); if (_color) document.documentElement.style.setProperty('--accent', _color)
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
  const hoy = new Date().toISOString().split('T')[0]
  let mesVer  = new Date().getMonth()
  let anioVer = new Date().getFullYear()

  function actualizarCabecera() {
    document.getElementById('mes-badge').textContent = meses[mesVer].toUpperCase() + ' ' + anioVer
  }
  actualizarCabecera()

  function mesAnterior() {
    mesVer--; if (mesVer < 0) { mesVer = 11; anioVer-- }
    actualizarCabecera(); cargarDashboard()
  }
  function mesSiguiente() {
    mesVer++; if (mesVer > 11) { mesVer = 0; anioVer++ }
    actualizarCabecera(); cargarDashboard()
  }

  async function cargarDashboard() {
    // Esperar a que window.currentUserId este disponible sin depender
    // del timing del evento auth-ready (que puede llegar antes del listener)
    let uid = window.currentUserId
    if (!uid) {
      uid = await new Promise(resolve => {
        const iv = setInterval(() => {
          if (window.currentUserId) { clearInterval(iv); resolve(window.currentUserId) }
        }, 50)
        // Si en 5s no llega, auth.js ya habra redirigido a login
        setTimeout(() => { clearInterval(iv); resolve(null) }, 5000)
      })
    }
    if (!uid) return

    const { data: perfil } = await dbClient.from('perfil').select('nombre').eq('usuario_id', uid).single()
    if (perfil?.nombre) {
      document.getElementById('saludo-nombre').textContent = 'Hola, ' + perfil.nombre + ' 👋'
      document.getElementById('avatar-header').textContent = perfil.nombre[0].toUpperCase()
    }
    document.getElementById('header-saludo').style.visibility = 'visible'

    const inicio = anioVer + '-' + String(mesVer + 1).padStart(2,'0') + '-01'
    const ultimoDia = new Date(anioVer, mesVer + 1, 0).getDate()
    const fin    = anioVer + '-' + String(mesVer + 1).padStart(2,'0') + '-' + String(ultimoDia).padStart(2,'0')
    console.log('[dashboard] uid:', uid, 'inicio:', inicio, 'fin:', fin)
    const { data: todosIngresos } = await dbClient.from('ingresos').select('fecha,monto').eq('usuario_id', uid).order('fecha', { ascending: false }).limit(10)
    console.log('[dashboard] TODOS los ingresos del usuario (sin filtro de fecha):', todosIngresos)
    const [{ data: gastos, error: eGas }, { data: ingresos, error: eIng }, { data: fijos, error: eFij }] = await Promise.all([
      dbClient.from('gastos').select('*').eq('usuario_id', uid).gte('fecha', inicio).lte('fecha', fin),
      dbClient.from('ingresos').select('*').eq('usuario_id', uid).gte('fecha', inicio).lte('fecha', fin),
      dbClient.from('gastos_fijos').select('*').eq('usuario_id', uid).lte('fecha_inicio', fin).or(`fecha_fin.gte.${inicio},fecha_fin.is.null`)
    ])
    const { data: metas } = await dbClient.from('metas').select('*').eq('usuario_id', uid).eq('es_principal', true).maybeSingle()

    console.log('[dashboard] gastos mes:', gastos?.length, eGas?.message)
    console.log('[dashboard] ingresos mes:', ingresos, 'error:', eIng?.message)
    console.log('[dashboard] fijos:', fijos?.length, eFij?.message)
    const totalGas = (gastos   || []).reduce((s, g) => s + parseFloat(g.monto), 0)
    const totalIng = (ingresos || []).reduce((s, i) => s + parseFloat(i.monto), 0)
    const totalFij = (fijos    || []).reduce((s, f) => s + parseFloat(f.monto), 0)
    const saldo    = totalIng - totalGas - totalFij

    document.getElementById('total-ingresos').textContent = window.moneda + totalIng.toLocaleString()
    document.getElementById('total-gastos').textContent   = window.moneda + (totalGas + totalFij).toLocaleString()
    document.getElementById('fijos-total').textContent    = window.moneda + totalFij.toLocaleString()

    const card   = document.getElementById('saldo-card')
    const amount = document.getElementById('saldo-amount')
    const icon   = document.getElementById('saldo-icon')

    if (saldo < 0) {
      card.classList.add('negativo')
      amount.textContent = '-' + window.moneda + Math.abs(saldo).toLocaleString()
      icon.textContent = '⚠️'
    } else {
      card.classList.remove('negativo')
      amount.textContent = window.moneda + saldo.toLocaleString()
      icon.textContent = '✓'
    }

    const listaFijos = document.getElementById('fijos-lista')
    listaFijos.innerHTML = ''
    const iconMap = [
      ['Comida','🍔'],['Alquiler','🏠'],['dito','💳'],['nea','📱'],['Gym','🏋️'],
      ['Gasolina','⛽'],['Tecnolog','💻'],['Salud','❤️'],['Ropa','👕'],
      ['Salidas','🎉'],['Remesas','🌍'],['Imprevisto','⚠️'],['mite','📋'],['Veh','🚗']
    ]
    ;(fijos || []).forEach(f => {
      const cat  = f.categoria || ''
      const icon = (iconMap.find(([k]) => cat.includes(k)) || [null,'📦'])[1]
      const div = document.createElement('div')
      div.className = 'fijo-item'
      div.innerHTML = `
        <div class="fijo-left">
          <div class="fijo-icon">${icon}</div>
          <div><div class="fijo-name">${f.nombre}</div><div class="fijo-date">Desde ${f.fecha_inicio}</div></div>
        </div>
        <div class="fijo-amount">${window.moneda}${f.monto}</div>
      `
      listaFijos.appendChild(div)
    })

    const { data: ultimo } = await dbClient.from('gastos').select('*').eq('usuario_id', uid).order('fecha', { ascending: false }).limit(1)
    if (ultimo && ultimo.length > 0) {
      const u = ultimo[0]
      document.getElementById('ultimo-desc').textContent  = u.descripcion
      document.getElementById('ultimo-date').textContent  = u.fecha + ' · ' + u.categoria
      document.getElementById('ultimo-monto').textContent = '-' + window.moneda + parseFloat(u.monto).toLocaleString()
    }
  }

  cargarDashboard()

  function abrirPanelMas() { document.getElementById('panel-mas').style.display = 'flex' }
  function cerrarPanelMas() { document.getElementById('panel-mas').style.display = 'none' }
  document.getElementById('panel-mas').addEventListener('click', function(e) { if (e.target === this) cerrarPanelMas() })

  const CATS_DEFAULT = '🍔 Comida,🏠 Alquiler,💳 Crédito,📱 Línea,🏋️ Gym,⛽ Gasolina,💻 Tecnología,❤️ Salud,👕 Ropa,🎉 Salidas,🌍 Remesas,⚠️ Gastos Imprevistos,📋 Trámite,🚗 Vehículo,📦 Otros'

  async function cargarCategoriasPerfil() {
    const uid = window.currentUserId
    if (!uid) return
    const { data: perfil } = await dbClient.from('perfil').select('categorias').eq('usuario_id', uid).maybeSingle()
    const catsStr = perfil?.categorias || CATS_DEFAULT
    const cats = catsStr.split(',').map(c => c.trim()).filter(Boolean)
    ;['g-categoria', 'f-categoria'].forEach(id => {
      const sel = document.getElementById(id)
      if (sel) sel.innerHTML = cats.map(c => `<option>${c}</option>`).join('')
    })
  }

  function toast(msg, tipo = 'ok') {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.className = `toast ${tipo} show`
    setTimeout(() => { t.className = 'toast' }, 2500)
  }

  let nuevaCatTarget = null

  function toggleNuevaCat(targetId) {
    nuevaCatTarget = targetId
    const panel = document.getElementById('panel-nueva-cat')
    panel.style.display = 'block'
    document.getElementById('nueva-cat-input').value = ''
    document.getElementById('nueva-cat-input').focus()
  }

  function cerrarNuevaCat() {
    document.getElementById('panel-nueva-cat').style.display = 'none'
    document.getElementById('nueva-cat-input').value = ''
  }

  async function guardarNuevaCategoria() {
    const nueva = document.getElementById('nueva-cat-input').value.trim()
    if (!nueva) { alert('Escribe una categoría'); return }
    const uid = window.currentUserId
    if (!uid) return

    const { data: perfil } = await dbClient.from('perfil').select('categorias').eq('usuario_id', uid).maybeSingle()
    const catsStr = perfil?.categorias || CATS_DEFAULT
    const cats = catsStr.split(',').map(c => c.trim()).filter(Boolean)
    if (cats.includes(nueva)) { alert('Esa categoría ya existe'); return }
    cats.push(nueva)
    const nuevaLista = cats.join(',')

    const { data: actualizados, error: errUpdate } = await dbClient.from('perfil')
      .update({ categorias: nuevaLista }).eq('usuario_id', uid).select('id')
    let error = errUpdate
    if (!errUpdate && (!actualizados || actualizados.length === 0)) {
      ;({ error } = await dbClient.from('perfil').insert({ usuario_id: uid, categorias: nuevaLista }))
    }
    if (error) { alert('Error: ' + error.message); return }

    ;['g-categoria', 'f-categoria'].forEach(id => {
      const sel = document.getElementById(id)
      if (sel) sel.innerHTML += `<option>${nueva}</option>`
    })
    if (nuevaCatTarget) document.getElementById(nuevaCatTarget).value = nueva

    cerrarNuevaCat()
    toast('✅ Categoría añadida')
  }

  function abrirMenu()       { document.getElementById('menu-fab').style.display = 'flex' }
  function cerrarMenu()      { document.getElementById('menu-fab').style.display = 'none' }
  async function abrirGasto()     { cerrarMenu(); document.getElementById('g-fecha').value = hoy; await cargarCategoriasPerfil(); document.getElementById('modal-gasto').style.display = 'flex' }
  function cerrarGasto()     { document.getElementById('modal-gasto').style.display = 'none' }
  function abrirIngreso()    { cerrarMenu(); document.getElementById('i-fecha').value = hoy; document.getElementById('modal-ingreso').style.display = 'flex' }
  function cerrarIngreso()   { document.getElementById('modal-ingreso').style.display = 'none' }
  async function abrirGastoFijo() { cerrarMenu(); document.getElementById('f-nombre').value=''; document.getElementById('f-monto').value=''; document.getElementById('f-fecha').value=''; document.getElementById('f-fecha-fin').value=''; await cargarCategoriasPerfil(); document.getElementById('modal-fijo').style.display = 'flex' }
  function cerrarGastoFijo() { document.getElementById('modal-fijo').style.display = 'none' }

  async function guardarGasto() {
    const fecha       = document.getElementById('g-fecha').value
    const descripcion = document.getElementById('g-descripcion').value.trim()
    const categoria   = document.getElementById('g-categoria').value
    const monto       = parseFloat(document.getElementById('g-monto').value)
    if (!descripcion || isNaN(monto)) { alert('Completa descripción y monto'); return }
    const { error } = await dbClient.from('gastos').insert([{ fecha, descripcion, categoria, monto, usuario_id: window.currentUserId }])
    if (error) { alert('Error: ' + error.message) }
    else { alert('✅ Gasto guardado'); cerrarGasto(); cargarDashboard() }
  }

  async function guardarIngreso() {
    const fecha    = document.getElementById('i-fecha').value
    const concepto = document.getElementById('i-concepto').value.trim()
    const tipo     = document.getElementById('i-tipo').value
    const monto    = parseFloat(document.getElementById('i-monto').value)
    if (!concepto || isNaN(monto)) { alert('Completa concepto y monto'); return }
    const { error } = await dbClient.from('ingresos').insert([{ fecha, concepto, tipo, monto, usuario_id: window.currentUserId }])
    if (error) { alert('Error: ' + error.message) }
    else { alert('✅ Ingreso guardado'); cerrarIngreso(); cargarDashboard() }
  }

  async function guardarFijo() {
    const nombre    = document.getElementById('f-nombre').value.trim()
    const categoria = document.getElementById('f-categoria').value
    const monto     = parseFloat(document.getElementById('f-monto').value)
    const fecha     = document.getElementById('f-fecha').value
    const fechaFin  = document.getElementById('f-fecha-fin').value || null
    if (!nombre || isNaN(monto) || !fecha) { alert('Completa todos los campos'); return }
    const dia = new Date(fecha).getDate()
    const { error } = await dbClient.from('gastos_fijos').insert([{ nombre, categoria, monto, dia_del_mes: dia, activo: true, fecha_inicio: fecha, fecha_fin: fechaFin, usuario_id: window.currentUserId }])
    if (error) { alert('Error: ' + error.message) }
    else { alert('✅ Gasto fijo guardado'); cerrarGastoFijo(); cargarDashboard() }
  }
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
