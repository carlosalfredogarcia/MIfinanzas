<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiFinanza – Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --card: #17171d; --card2: #1e1e27;
    --accent: #b8f564; --accent2: #4fd1c5; --danger: #ff6b6b;
    --text: #f0f0f5; --subtext: #8888a0; --border: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
  .phone { width: 390px; min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; justify-content: center; padding: 40px 24px; position: relative; overflow: hidden; }
  .phone::before { content: ''; position: absolute; top: -100px; left: -60px; width: 350px; height: 350px; background: radial-gradient(circle, rgba(184,245,100,0.07) 0%, transparent 70%); pointer-events: none; }
  .logo { text-align: center; margin-bottom: 40px; animation: fadeUp 0.5s ease both; }
  .logo-icon { font-size: 52px; margin-bottom: 10px; }
  .logo-title { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; background: linear-gradient(90deg, #fff 30%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .logo-sub { font-size: 14px; color: var(--subtext); margin-top: 6px; }
  .tabs { display: flex; background: var(--card); border-radius: 14px; padding: 4px; margin-bottom: 22px; border: 1px solid var(--border); animation: fadeUp 0.5s 0.1s ease both; opacity: 0; }
  .tab { flex: 1; text-align: center; padding: 11px; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--subtext); cursor: pointer; transition: all 0.2s; }
  .tab.active { background: rgba(184,245,100,0.15); color: var(--accent); }
  .form-section { display: none; animation: fadeUp 0.4s ease both; }
  .form-section.active { display: block; }
  .fld { margin-bottom: 14px; }
  .lbl { font-size: 11px; color: var(--subtext); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 6px; }
  .inp { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .inp:focus { border-color: rgba(184,245,100,0.3); }
  .btn-main { width: 100%; border: none; border-radius: 14px; padding: 16px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 6px; transition: opacity 0.2s; }
  .btn-main:hover { opacity: 0.88; }
  .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.25); border-radius: 12px; padding: 12px 16px; font-size: 13px; color: var(--danger); margin-bottom: 16px; display: none; }
  .error-msg.visible { display: block; }
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .loading-overlay.visible { display: flex; }
  .loading-spinner { width: 42px; height: 42px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-text { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: var(--accent); }
  .loading-sub { font-size: 13px; color: var(--subtext); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#b8f564">
</head>
<body>
<div class="phone">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div class="logo-title">MiFinanza</div>
    <div class="logo-sub">Tu dinero, bajo control</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-entrar" onclick="setTab('entrar')">Entrar</div>
    <div class="tab" id="tab-crear" onclick="setTab('crear')">Crear cuenta</div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <!-- Formulario login -->
  <div class="form-section active" id="form-entrar">
    <div class="fld">
      <label class="lbl">Correo</label>
      <input type="email" id="login-email" class="inp" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <div class="fld" style="margin-bottom:18px">
      <label class="lbl">Contraseña</label>
      <input type="password" id="login-pass" class="inp" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-main" style="background:var(--accent);color:#0f0f13" onclick="iniciarSesion()">Entrar</button>
  </div>

  <!-- Formulario registro -->
  <div class="form-section" id="form-crear">
    <div class="fld">
      <label class="lbl">Correo</label>
      <input type="email" id="reg-email" class="inp" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <div class="fld">
      <label class="lbl">Contraseña</label>
      <input type="password" id="reg-pass" class="inp" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>
    <div class="fld" style="margin-bottom:18px">
      <label class="lbl">Confirmar contraseña</label>
      <input type="password" id="reg-pass2" class="inp" placeholder="Repite la contraseña" autocomplete="new-password">
    </div>
    <button class="btn-main" style="background:var(--accent2);color:#0f0f13" onclick="crearCuenta()">Crear cuenta</button>
  </div>
</div>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loading-text">Verificando...</div>
  <div class="loading-sub" id="loading-sub"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://gapeweomesgawnodarsp.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_u7ug3SBOsuz2zb56gqBLjw_aLJ0Vvp8'
  const dbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

  // Si ya hay sesión activa, ir directo a la app
  dbClient.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.replace('index.html')
  })

  function setTab(tab) {
    document.getElementById('tab-entrar').classList.toggle('active', tab === 'entrar')
    document.getElementById('tab-crear').classList.toggle('active', tab === 'crear')
    document.getElementById('form-entrar').classList.toggle('active', tab === 'entrar')
    document.getElementById('form-crear').classList.toggle('active', tab === 'crear')
    ocultarError()
  }

  function mostrarError(msg) {
    const el = document.getElementById('error-msg')
    el.textContent = msg
    el.classList.add('visible')
  }

  function ocultarError() {
    document.getElementById('error-msg').classList.remove('visible')
  }

  function mostrarCarga(texto, sub) {
    document.getElementById('loading-text').textContent = texto
    document.getElementById('loading-sub').textContent  = sub || ''
    document.getElementById('loading').classList.add('visible')
  }

  // Asigna los datos sin usuario_id (de antes del login) al nuevo usuario
  async function migrarDatosExistentes(userId) {
    const tablas = ['gastos', 'ingresos', 'gastos_fijos', 'metas', 'perfil']
    for (const tabla of tablas) {
      await dbClient.from(tabla).update({ usuario_id: userId }).is('usuario_id', null)
    }
  }

  async function iniciarSesion() {
    const email = document.getElementById('login-email').value.trim()
    const pass  = document.getElementById('login-pass').value
    if (!email || !pass) { mostrarError('Ingresa tu correo y contraseña'); return }

    ocultarError()
    mostrarCarga('Verificando...', '')

    const { data, error } = await dbClient.auth.signInWithPassword({ email, password: pass })

    if (error) {
      document.getElementById('loading').classList.remove('visible')
      const msg = error.message.toLowerCase()
      if (msg.includes('invalid login') || msg.includes('invalid credentials')) {
        mostrarError('Correo o contraseña incorrectos')
      } else {
        mostrarError(error.message)
      }
      return
    }

    mostrarCarga('Cargando tu cuenta...', 'Un momento...')
    await migrarDatosExistentes(data.user.id)
    window.location.replace('index.html')
  }

  async function crearCuenta() {
    const email = document.getElementById('reg-email').value.trim()
    const pass  = document.getElementById('reg-pass').value
    const pass2 = document.getElementById('reg-pass2').value
    if (!email || !pass)  { mostrarError('Completa todos los campos'); return }
    if (pass !== pass2)   { mostrarError('Las contraseñas no coinciden'); return }
    if (pass.length < 6)  { mostrarError('La contraseña debe tener al menos 6 caracteres'); return }

    ocultarError()
    mostrarCarga('Creando tu cuenta...', '')

    const { data, error } = await dbClient.auth.signUp({ email, password: pass })

    if (error) {
      document.getElementById('loading').classList.remove('visible')
      if (error.message.toLowerCase().includes('already registered')) {
        mostrarError('Este correo ya tiene una cuenta. Usa la pestaña "Entrar".')
      } else {
        mostrarError(error.message)
      }
      return
    }

    // Sin sesión = confirmación de email pendiente (desactivar en Supabase > Auth > Providers > Email > Confirm email)
    if (!data.session) {
      document.getElementById('loading').classList.remove('visible')
      mostrarError('Revisa tu correo para confirmar la cuenta antes de entrar.')
      return
    }

    mostrarCarga('Configurando tu cuenta...', 'Vinculando tus datos...')
    await migrarDatosExistentes(data.user.id)
    window.location.replace('index.html')
  }

  // Permitir Enter para enviar el formulario activo
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return
    if (document.getElementById('form-entrar').classList.contains('active')) iniciarSesion()
    else crearCuenta()
  })
</script>
</body>
</html>
